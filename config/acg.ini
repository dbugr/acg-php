; ACG website — localhost Docker dev settings

app_env = "dev"

; Points PHP DB connection to the mysql Docker service
dbhostname = "mysql"

; Match the dev-mode paths in always.include.php
include_path = "/shared/httpd/acg/lib:/shared/httpd/acg/public_html/include:."

; Session storage
session.save_handler = files
session.save_path = /shared/httpd/acg/var/session
session.gc_maxlifetime = 2400

; Upload limits (matching production)
memory_limit = 128M
max_execution_time = 90
file_uploads = On
upload_tmp_dir = /tmp
upload_max_filesize = 9M
post_max_size = 10M
max_file_uploads = 9
