<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /shared/httpd/acg/public_html

    <Directory /shared/httpd/acg/public_html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Alias for the /join/ virtual directory used by the site
    Alias /join /shared/httpd/acg/public_html/join

    # PHP include path is set via acg.ini

    ErrorLog /shared/httpd/acg/var/log/apache-error.log
    CustomLog /shared/httpd/acg/var/log/apache-access.log combined
</VirtualHost>
